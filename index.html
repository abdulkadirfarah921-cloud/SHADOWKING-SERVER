<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Shadow King Login</title>
    <style>
        body {background:#111; color:#fff; font-family: Arial; text-align:center; padding:50px;}
        input, button {padding:10px; margin:5px; border-radius:5px; border:none;}
        button {background:#ff0000; color:#fff; cursor:pointer;}
        #msg {margin-top:20px; font-weight:bold;}
    </style>
</head>
<body>
    <h1>Shadow King - تسجيل الدخول</h1>
    <input type="email" id="email" placeholder="الايميل"><br>
    <input type="password" id="pass" placeholder="كلمة السر"><br>
    <button onclick="login()">دخول</button>
    <button onclick="register()">تسجيل جديد</button>
    <div id="msg"></div>

<script>
const API = "حط_رابط_render_هون"; // مثال: https://shadowking-server.onrender.com

async function login(){
    let email = document.getElementById('email').value;
    let pass = document.getElementById('pass').value;
    let res = await fetch(API + "/api/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, password: pass})
    });
    let data = await res.json();
    document.getElementById('msg').innerHTML = data.msg;
}

async function register(){
    let email = document.getElementById('email').value;
    let pass = document.getElementById('pass').value;
    let res = await fetch(API + "/api/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, password: pass})
    });
    let data = await res.json();
    document.getElementById('msg').innerHTML = data.msg;
}
</script>
</body>
</html>
